<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colinspace｜个人作品集</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="site-nav" aria-label="主导航">
      <div class="container nav-inner">
        <a class="brand" href="#">Colinspace</a>
        <ul class="nav-links">
          <li><a href="#projects">项目</a></li>
          <li><a href="#about">关于我</a></li>
          <li><a href="#contact">联系</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
          深色模式
        </button>
      </div>
    </nav>

    <header class="hero container" id="about">
      <p id="hero-eyebrow" class="eyebrow">产品设计与前端实践</p>
      <h1 id="hero-title">用清晰的体验，把复杂问题做简单</h1>
      <p id="hero-description" class="hero-text">
        我专注于构建高质量网页与产品原型，强调可读性、响应速度与可维护性，
        让每一次迭代都更高效。
      </p>
      <button id="btn" class="hero-button">开始了解</button>
      <p id="message" class="message" aria-live="polite"></p>
    </header>

    <main class="container" aria-label="首页内容">
      <section class="projects" id="projects" aria-label="项目模块">
        <p id="projects-status" class="projects-status" aria-live="polite">项目加载中...</p>
      </section>

      <section class="contact" id="contact" aria-label="联系模块">
        <h2 id="contact-title">联系</h2>
        <p id="contact-description" class="contact-text">
          如果你有合作想法、项目需求或交流计划，欢迎随时发来消息，我会尽快回复。
        </p>
        <form id="contact-form" class="contact-form" novalidate>
          <label class="form-field" for="contact-name">
            <span>Name</span>
            <input id="contact-name" name="name" type="text" maxlength="50" required />
          </label>
          <label class="form-field" for="contact-email">
            <span>Email</span>
            <input id="contact-email" name="email" type="email" maxlength="100" required />
          </label>
          <label class="form-field" for="contact-message">
            <span>Message</span>
            <textarea id="contact-message" name="message" rows="4" maxlength="500" required></textarea>
          </label>
          <button type="submit" class="contact-submit">发送</button>
          <p id="contact-feedback" class="contact-feedback" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 Colinspace. 保留所有权利。</p>
        <a id="contact-email-link" href="mailto:hello@example.com">hello@example.com</a>
      </div>
    </footer>

    <script src="projects-view.js"></script>
    <script src="script.js"></script>
  </body>
</html>
