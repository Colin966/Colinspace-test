<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects 管理页</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container admin-page" aria-label="项目管理页面">
      <header class="admin-header">
        <h1>Projects 管理</h1>
        <p>用于查看、新增、编辑、删除项目。</p>
      </header>

      <p id="admin-feedback" class="admin-feedback" aria-live="polite"></p>

      <section class="admin-card" aria-label="管理口令验证">
        <h2>管理口令验证</h2>
        <p id="auth-status" class="admin-auth-status">当前状态：未验证（仅可查看）</p>
        <form id="auth-form" class="admin-auth-form" novalidate>
          <label class="form-field" for="admin-password">
            <span>管理口令</span>
            <input id="admin-password" type="password" autocomplete="current-password" />
          </label>
          <div class="admin-form-actions">
            <button id="auth-button" class="admin-primary" type="submit">验证口令</button>
            <button id="logout-button" class="admin-secondary" type="button">退出验证</button>
          </div>
        </form>
      </section>

      <section class="admin-card" aria-label="系统状态">
        <h2>系统状态</h2>
        <p class="admin-status-tip">用于快速查看服务与数据库是否正常。</p>
        <div id="system-status" class="system-status-list" role="status" aria-live="polite">
          <p>服务状态：检测中...</p>
          <p>数据库状态：检测中...</p>
          <p>数据库文件路径：读取中...</p>
          <p>服务器时间：读取中...</p>
        </div>
        <div class="admin-form-actions">
          <button id="refresh-health-button" class="admin-secondary" type="button">
            刷新系统状态
          </button>
        </div>
      </section>

      <section class="admin-card" aria-label="新增或编辑项目">
        <h2 id="form-title">新增项目</h2>
        <form id="project-form" class="admin-form" novalidate>
          <input id="project-id" type="hidden" />

          <label class="form-field" for="project-title">
            <span>项目标题（必填）</span>
            <input id="project-title" type="text" maxlength="100" required />
          </label>

          <label class="form-field" for="project-description">
            <span>项目描述</span>
            <textarea id="project-description" rows="4" maxlength="500"></textarea>
          </label>

          <label class="form-field" for="project-link">
            <span>项目链接（可选）</span>
            <input id="project-link" type="url" placeholder="https://example.com" />
          </label>

          <div class="admin-form-actions">
            <button id="save-button" class="admin-primary" type="submit">保存</button>
            <button id="cancel-button" class="admin-secondary" type="button">取消编辑</button>
          </div>
        </form>
      </section>

      <section class="admin-card" aria-label="网站配置">
        <h2>网站配置</h2>
        <form id="site-settings-form" class="admin-form" novalidate>
          <label class="form-field" for="setting-hero-title">
            <span>Hero 标题（heroTitle）</span>
            <input id="setting-hero-title" type="text" maxlength="120" required />
          </label>

          <label class="form-field" for="setting-hero-subtitle">
            <span>Hero 副标题（heroSubtitle）</span>
            <textarea id="setting-hero-subtitle" rows="3" maxlength="300" required></textarea>
          </label>

          <label class="form-field" for="setting-hero-button-text">
            <span>Hero 按钮文案（heroButtonText）</span>
            <input id="setting-hero-button-text" type="text" maxlength="40" required />
          </label>

          <label class="form-field" for="setting-contact-title">
            <span>联系区标题（contactTitle）</span>
            <input id="setting-contact-title" type="text" maxlength="60" required />
          </label>

          <label class="form-field" for="setting-contact-description">
            <span>联系区描述（contactDescription）</span>
            <textarea id="setting-contact-description" rows="3" maxlength="300" required></textarea>
          </label>

          <label class="form-field" for="setting-contact-email">
            <span>联系邮箱（contactEmail）</span>
            <input id="setting-contact-email" type="email" maxlength="120" required />
          </label>

          <div class="admin-form-actions">
            <button id="save-site-settings-button" class="admin-primary" type="submit">
              保存网站配置
            </button>
          </div>
        </form>
      </section>

      <section class="admin-card" aria-label="项目列表">
        <h2>当前项目列表</h2>
        <p id="admin-loading" class="projects-status">项目加载中...</p>
        <div id="projects-list" class="admin-list"></div>
      </section>

      <section class="admin-card" aria-label="留言列表">
        <h2>留言列表</h2>
        <p id="messages-loading" class="projects-status">请先完成口令验证后查看留言列表。</p>
        <div id="messages-list" class="admin-list"></div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
